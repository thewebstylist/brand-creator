name: Deploy to GitHub Pages

on:
  push:
    # ember-oak branch included so the site can be previewed live before merge;
    # the branch is a superset of main, so existing pages are unaffected.
    branches: [main, claude/ember-oak-steakhouse-site-h8zjmj]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
        id: deployment
